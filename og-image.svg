<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b4a2e"/>
      <stop offset="100%" stop-color="#0f2d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8873a"/>
      <stop offset="100%" stop-color="#e8a855"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="80" y="120" width="5" height="390" fill="url(#accent)" rx="2"/>

  <!-- Car silhouette (simplified Duster SUV shape) -->
  <g transform="translate(760, 200)" opacity="0.18">
    <!-- body -->
    <rect x="20" y="80" width="380" height="100" rx="12" fill="#c8873a"/>
    <!-- roof -->
    <path d="M80 80 Q90 30 160 20 L320 20 Q390 20 400 80Z" fill="#c8873a"/>
    <!-- windshield cut -->
    <path d="M100 78 Q108 42 165 32 L310 32 Q365 32 378 78Z" fill="#0f2d1a" opacity="0.6"/>
    <!-- wheels -->
    <circle cx="100" cy="185" r="42" fill="#0a1e0e"/>
    <circle cx="100" cy="185" r="28" fill="#162c1c"/>
    <circle cx="100" cy="185" r="14" fill="#c8873a" opacity="0.7"/>
    <circle cx="320" cy="185" r="42" fill="#0a1e0e"/>
    <circle cx="320" cy="185" r="28" fill="#162c1c"/>
    <circle cx="320" cy="185" r="14" fill="#c8873a" opacity="0.7"/>
    <!-- bumper -->
    <rect x="18" y="172" width="384" height="12" rx="6" fill="#0a1e0e"/>
    <!-- headlight -->
    <rect x="22" y="100" width="30" height="16" rx="4" fill="#e8c87a" opacity="0.8"/>
    <!-- taillight -->
    <rect x="368" y="100" width="30" height="16" rx="4" fill="#e03838" opacity="0.8"/>
  </g>

  <!-- Road line -->
  <rect x="0" y="400" width="1200" height="3" fill="rgba(200,135,58,0.12)"/>

  <!-- Logo dot -->
  <circle cx="108" cy="240" r="8" fill="#c8873a"/>

  <!-- Main title -->
  <text x="130" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#f7f0e3" letter-spacing="-1">Itacaré Transfer</text>

  <!-- Divider line -->
  <rect x="130" y="280" width="320" height="3" fill="url(#accent)" rx="1"/>

  <!-- Subtitle -->
  <text x="130" y="330" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" fill="rgba(247,240,227,0.75)" letter-spacing="2">PRIVATE TRANSFER · BAHIA, BRAZIL</text>

  <!-- Features row -->
  <text x="130" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(247,240,227,0.55)">✔ Fixed price</text>
  <text x="320" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(247,240,227,0.55)">✔ Door-to-door</text>
  <text x="530" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(247,240,227,0.55)">✔ English spoken</text>
  <text x="740" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(247,240,227,0.55)">✔ 24/7 available</text>

  <!-- Bottom URL -->
  <text x="130" y="545" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(200,135,58,0.8)" letter-spacing="1">itacaretransfer.com.br</text>

  <!-- Bottom right — WhatsApp hint -->
  <text x="1070" y="545" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(247,240,227,0.4)" text-anchor="end">Book via WhatsApp</text>
</svg>
