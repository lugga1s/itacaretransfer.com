  const offsetRef = useRef(0);
  const dragRef = useRef({ active: false, startX: 0, startOffset: 0 });
  const animRef = useRef(null);
  const speedRef = useRef(0.5);

  const allReviews = [...reviews, ...reviews, ...reviews];
  const CARD_W = 314;
  const RESET_POINT = reviews.length * CARD_W;

  useEffect(() => {
    const tick = () => {
      if (!dragRef.current.active) {
        offsetRef.current -= speedRef.current;
        if (Math.abs(offsetRef.current) >= RESET_POINT) {
          offsetRef.current += RESET_POINT;
        }
        if (trackRef.current) {
          trackRef.current.style.transform = `translateX(${offsetRef.current}px)`;
        }
      }
      animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  const getX = (e) => e.touches ? e.touches[0].clientX : e.clientX;

  const onStart = (e) => {
    dragRef.current = { active: true, startX: getX(e), startOffset: offsetRef.current };
    if (trackRef.current) trackRef.current.style.cursor = "grabbing";
  };

  const onMove = (e) => {
    if (!dragRef.current.active) return;
    const dx = getX(e) - dragRef.current.startX;
    offsetRef.current = dragRef.current.startOffset + dx;
    if (trackRef.current) {
      trackRef.current.style.transform = `translateX(${offsetRef.current}px)`;
    }
  };

  const onEnd = () => {
    dragRef.current.active = false;
    if (trackRef.current) trackRef.current.style.cursor = "grab";
    if (Math.abs(offsetRef.current) >= RESET_POINT) {
      offsetRef.current = offsetRef.current % RESET_POINT;
    }
    if (offsetRef.current > 0) {
      offsetRef.current -= RESET_POINT;
    }
  };

  return (
    <section style={{ maxWidth: 1120, margin: "0 auto", padding: "32px 20px" }}>

function VehicleCarousel({ vehicles, colors: P, font: dsp, onCta }) {
  const [active, setActive] = useState(1);
  const scrollRef = useRef(null);
  const isScrolling = useRef(null);

  // Scroll to card idx imperatively
  const scrollTo = (idx) => {
    const el = scrollRef.current;
    if (!el) return;
    const card = el.children[idx];
    if (!card) return;
    const elCenter = el.getBoundingClientRect().left + el.offsetWidth / 2;
    const cardCenter = card.getBoundingClientRect().left + card.offsetWidth / 2;
    el.scrollBy({ left: cardCenter - elCenter, behavior: "smooth" });
    setActive(idx);
  };

  // Update active dot as user scrolls
  const onScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    clearTimeout(isScrolling.current);
    isScrolling.current = setTimeout(() => {
      const elCenter = el.scrollLeft + el.offsetWidth / 2;
      let closest = 0;
      let minDist = Infinity;
      Array.from(el.children).forEach((child, i) => {
        const cardCenter = child.offsetLeft + child.offsetWidth / 2;
        const dist = Math.abs(cardCenter - elCenter);
        if (dist < minDist) { minDist = dist; closest = i; }
      });
      setActive(closest);
    }, 80);
  };

  // Start on card 1 (Most Popular)
  useEffect(() => {
    setTimeout(() => scrollTo(1), 60);
  }, []);

  return (
    <section style={{ padding: "24px 0 64px" }}>
      <style>{`
        .vehicle-scroll {
          display: flex;
          gap: 16px;
          overflow-x: scroll;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          padding: 12px 0 16px;
        }
        .vehicle-scroll::-webkit-scrollbar { display: none; }
        .vehicle-scroll::before,
        .vehicle-scroll::after {
          content: '';
          flex: 0 0 calc(50vw - 170px);
          min-width: 16px;
        }
        .vehicle-card {
          scroll-snap-align: center;
          flex: 0 0 min(340px, calc(100vw - 64px));
          width: min(340px, calc(100vw - 64px));
          transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
      `}</style>

      <div style={{ textAlign: "center", marginBottom: 36, padding: "0 20px" }}>
        <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: "0.12em", textTransform: "uppercase", color: P.sand, marginBottom: 10 }}>Transfer Options</div>
        <h2 style={{ fontFamily: dsp, fontSize: "clamp(26px, 4vw, 40px)", fontWeight: 700, color: P.ocean, marginBottom: 10 }}>Our Fleet</h2>
        <p style={{ color: P.textSoft, fontSize: 15, maxWidth: 400, margin: "0 auto" }}>Swipe to explore options. Every vehicle includes AC and door-to-door service.</p>
      </div>

      <div ref={scrollRef} className="vehicle-scroll" onScroll={onScroll}>
        {vehicles.map((v, idx) => {
          const pop = v.id === "private-car";
          const t = v.theme;
          const isActive = idx === active;
          return (
            <article
              key={v.id}
              className="vehicle-card"
              style={{
                background: P.white, borderRadius: 22, overflow: "hidden",
                display: "flex", flexDirection: "column",
                border: pop ? `2.5px solid ${t.accent}` : `1px solid ${P.border}`,
                boxShadow: isActive ? `0 16px 48px ${t.accent}28` : "0 2px 12px rgba(0,0,0,0.06)",
                transform: isActive ? "scale(1)" : "scale(0.95)",
              }}
            >
              <div style={{ height: pop ? 6 : 4, background: t.gradient }} />
              {pop && (
                <div style={{ background: t.gradient, color: P.white, textAlign: "center", padding: "10px 16px", fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>

              <div style={{ padding: "28px 24px", display: "flex", flexDirection: "column", flex: 1 }}>
