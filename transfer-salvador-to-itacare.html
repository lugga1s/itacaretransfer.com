  const CARD_W = 314; // minWidth + gap

  useEffect(() => {
    const tick = () => {
      if (!dragRef.current.active) {
        offsetRef.current -= speedRef.current;
        // Seamless reset: when we've scrolled past one full set, jump back
        if (Math.abs(offsetRef.current) >= RESET_POINT) {

        if (trackRef.current) {

    if (Math.abs(offsetRef.current) >= RESET_POINT) {
